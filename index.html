<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Final App</title>

<style>
body{
  font-family: Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.card{
  background:white;
  padding:20px;
  width:95%;
  max-width:500px;
  border-radius:25px;
  text-align:center;
  max-height:90vh;
  overflow-y:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
  gap:15px;
}

/* ICON */
.cat{
  aspect-ratio:1/1;
  border-radius:20px;
  border:none;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  box-shadow:0 5px 10px rgba(0,0,0,0.15);
  transition: all 0.15s ease;
}
.cat span{ font-size:28px; }

.cat:hover{ transform:translateY(-3px); }
.cat:active{ transform:scale(0.9); }

/* 🎨 สี */
.c1{background:linear-gradient(135deg,#ff9a9e,#fad0c4);}
.c2{background:linear-gradient(135deg,#a18cd1,#fbc2eb);}

/* ANIMATION */
.fade{
  animation:fade 0.3s ease;
}
@keyframes fade{
  from{opacity:0; transform:scale(0.95);}
  to{opacity:1; transform:scale(1);}
}

/* WORD */
#word{
  font-size:38px;
  font-weight:bold;
}

/* INPUT */
#ans input{
  width:24px;
  height:36px;
  margin:4px;
  text-align:center;
  font-size:18px;
  border-radius:10px;
  border:2px solid #4facfe;
}

/* BUTTON */
button{
  padding:12px;
  border:none;
  border-radius:15px;
  color:white;
  font-size:16px;
  width:100%;
  margin-top:10px;
}

.btn-check{background:#4facfe;}
.btn-hint{background:#f6d365;}
.btn-speak{background:#84fab0;}

/* NAV */
.nav{ display:flex; gap:5px; }

.nav button:nth-child(1){background:#fa709a;}
.nav button:nth-child(2){background:#30cfd0;}
.nav button:nth-child(3){background:#a18cd1;}

.nav button{ width:33%; }

#result{ margin-top:10px; font-size:18px; }

</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="card">
  <h2>📚 เลือกหมวด</h2>
  <div class="grid" id="categoryGrid"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="card" style="display:none;">
  <div id="word"></div>
  <div id="progress"></div>
  <div id="ans"></div>

  <button class="btn-check" onclick="check()">ตอบ</button>
  <button class="btn-hint" onclick="hint()">💡 ใบ้</button>
  <button class="btn-speak" onclick="speak()">🔊 ออกเสียง</button>

  <div id="result"></div>

  <div class="nav">
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>
    <button onclick="home()">🏠</button>
  </div>
</div>

<script>

// vocab (ตัวอย่าง 2 หมวด)
const vocab = {
  Animal:[
    {th:"สุนัข",en:"dog",read:"ด็อก"},
    {th:"แมว",en:"cat",read:"แคท"},
    {th:"นก",en:"bird",read:"เบิร์ด"},
    {th:"ปลา",en:"fish",read:"ฟิช"}
  ],
  Daily:[
    {th:"โต๊ะ",en:"table",read:"เทเบิล"},
    {th:"เก้าอี้",en:"chair",read:"แชร์"},
    {th:"เตียง",en:"bed",read:"เบด"},
    {th:"หมอน",en:"pillow",read:"พิลโลว์"}
  ]
};

const icons = {Animal:"🐶",Daily:"🏠"};
const colors=["c1","c2"];

function renderCategories(){
  let grid=document.getElementById("categoryGrid");
  let i=0;

  for(let key in vocab){
    let btn=document.createElement("button");
    btn.className="cat "+colors[i%colors.length];
    btn.innerHTML=`<span>${icons[key]}</span>${key}`;
    btn.onclick=()=>selectCategory(key);
    grid.appendChild(btn);
    i++;
  }
}
renderCategories();

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function selectCategory(cat){
  list=shuffle([...vocab[cat]]);
  startGame();
}

function startGame(){
  i=0; score=0; wrong=[]; reviewMode=false;
  menu.style.display="none";
  quiz.style.display="block";
  show();
}

let list=[], i=0, score=0, wrong=[], reviewMode=false;

// 🔊
function speak(text=null){
  let word=text||list[i].en;
  let msg=new SpeechSynthesisUtterance(word);
  msg.lang="en-US";
  speechSynthesis.speak(msg);
}

// show
function show(){

  // 🔥 animation
  quiz.classList.remove("fade");
  void quiz.offsetWidth;
  quiz.classList.add("fade");

  let q=list[i];
  word.innerText=q.th;

  ans.innerHTML="";

  for(let j=0;j<q.en.length;j++){
    let inp=document.createElement("input");
    inp.maxLength=1;

    // ✅ FIX iOS keyboard
    inp.setAttribute("autocapitalize","off");
    inp.setAttribute("autocomplete","off");
    inp.setAttribute("autocorrect","off");
    inp.setAttribute("spellcheck","false");
    inp.inputMode="latin";

    inp.addEventListener("input",function(){
      this.value=this.value.toLowerCase();
      if(this.value.length===1){
        let next=this.nextElementSibling;
        if(next) next.focus();
      }
    });

    inp.addEventListener("keydown",function(e){
      if(e.key==="Backspace" && this.value===""){
        let prev=this.previousElementSibling;
        if(prev) prev.focus();
      }
    });

    ans.appendChild(inp);
  }

  setTimeout(()=>{
    let first=document.querySelector("#ans input");
    if(first) first.focus();
  },100);

  progress.innerText=`${i+1}/${list.length} | คะแนน ${score}`;
  result.innerText="";
}

// answer
function getAnswer(){
  return [...document.querySelectorAll("#ans input")]
  .map(i=>i.value).join("").toLowerCase();
}

// check
function check(){
  let user=getAnswer();
  let correct=list[i].en;
  let read=list[i].read;

  if(user===correct){
    result.innerHTML=`✅ ${correct}<br>🔊 ${read}`;
    score++;
  }else{
    result.innerHTML=`❌ ${correct}<br>🔊 ${read}`;
    wrong.push(list[i]);
  }

  speak(correct);
}

// hint
function hint(){
  let w=list[i].en;
  let inputs=document.querySelectorAll("#ans input");
  let r=Math.floor(Math.random()*w.length);
  inputs[r].value=w[r];
}

// nav
function next(){ i<list.length-1?(i++,show()):finish(); }
function prev(){ if(i>0){i--;show();} }
function home(){ location.reload(); }

// finish + review
function finish(){
  if(!reviewMode && wrong.length>0){
    alert("🔁 ทบทวนคำผิด "+wrong.length+" คำ");

    list=shuffle([...wrong]);
    i=0;
    wrong=[];
    reviewMode=true;

    show();
  }else{
    alert("🏆 คะแนน: "+score);
    reviewMode=false;
  }
}

</script>

</body>
</html>
