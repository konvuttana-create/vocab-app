<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab App</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
body{
  font-family: Arial;
  margin:0;
  text-align:center;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.card{
  background:white;
  margin:50px auto;
  padding:25px;
  width:320px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
}

input{
  padding:10px;
  width:80%;
  border-radius:10px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div id="menu" class="card">
<h2>📘 Vocab App</h2>

<button onclick="start('fruit')">ผลไม้</button>
<button onclick="start('animal')">สัตว์</button>
<button onclick="start('place')">สถานที่</button>
<button onclick="start('date')">วัน/เดือน</button>
<button onclick="start('daily')">ของใช้</button>
<button onclick="start('work')">การทำงาน</button>

<hr>
<button onclick="start('mix')">🔥 สุ่มทุกหมวด</button>

</div>

<div id="quiz" class="card" style="display:none;">
<h2 id="word"></h2>

<input id="ans" placeholder="พิมพ์คำศัพท์">

<br><br>
<button onclick="check()">ตอบ</button>

<p id="result"></p>
<p id="progress"></p>

<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
<button onclick="home()">🏠</button>
</div>

<script>

// 🔊 เสียง
function sound(ok){
 new Audio(ok?
 "https://www.soundjay.com/buttons/sounds/button-3.mp3":
 "https://www.soundjay.com/buttons/sounds/button-10.mp3"
 ).play();
}

// 📚 data
const data={
 fruit:[{th:"แอปเปิ้ล",en:"apple"},{th:"กล้วย",en:"banana"}],
 animal:[{th:"หมา",en:"dog"},{th:"แมว",en:"cat"}],
 place:[{th:"โรงเรียน",en:"school"}],
 date:[{th:"วันจันทร์",en:"monday"}],
 daily:[{th:"โต๊ะ",en:"table"}],
 work:[{th:"ประชุม",en:"meeting"}]
};

let list=[],i=0,score=0,wrong=[];

// ▶️ start
function start(cat){

 if(cat==="mix"){
   list=[].concat(...Object.values(data));
 }else{
   list=[...data[cat]];
 }

 // สุ่ม
 list=list.sort(()=>Math.random()-0.5);

 i=0; score=0; wrong=[];

 menu.style.display="none";
 quiz.style.display="block";

 show();
}

// 📖 show
function show(){
 let q=list[i];
 word.innerText=q.th;
 ans.value="";
 result.innerText="";
 progress.innerText=`ข้อ ${i+1}/${list.length} | คะแนน ${score}`;
}

// ✅ check
function check(){
 let user=ans.value.toLowerCase().trim();
 let correct=list[i].en.toLowerCase();

 if(user===correct){
   result.innerText="✅ ถูก";
   score++;
   sound(true);
 }else{
   result.innerText="❌ "+correct;
   wrong.push(list[i]);
   sound(false);
 }

 save();
}

// ➡️ next
function next(){
 if(i<list.length-1){
   i++;
   show();
 }else{
   finish();
 }
}

// ⬅️ prev
function prev(){
 if(i>0){
   i--;
   show();
 }
}

// 🏠 home
function home(){
 localStorage.clear();
 location.reload();
}

// 🎯 finish
function finish(){
 if(wrong.length>0){
   alert("ทบทวนคำที่ผิด");
   list=wrong;
   wrong=[];
   i=0;
   show();
 }else{
   alert("จบแล้ว! คะแนน: "+score);
   localStorage.clear();
 }
}

// 💾 save
function save(){
 localStorage.setItem("progress",
 JSON.stringify({list,i,score,wrong})
 );
}

// 🔄 load
window.onload=()=>{
 let p=localStorage.getItem("progress");
 if(p){
   p=JSON.parse(p);
   list=p.list;i=p.i;score=p.score;wrong=p.wrong;

   menu.style.display="none";
   quiz.style.display="block";
   show();
 }
}

// 📱 PWA
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
