<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab App</title>

<style>
body{
  font-family: Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

/* กล่อง */
.card{
  background:white;
  padding:25px;
  width:340px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
}

/* ปุ่ม */
button{
  padding:15px;
  border:none;
  border-radius:15px;
  background:#4facfe;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

/* grid เมนู */
.menu-grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px;
  margin-top:10px;
}

/* input */
input{
  padding:12px;
  width:80%;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

/* hover */
button:hover{
  background:#3b8eea;
}
</style>
</head>

<body>

<!-- หน้าเมนู -->
<div id="menu" class="card">
  <h2>📘 Vocab App By Khon</h2>

  <div class="menu-grid">
    <button onclick="start('fruit')">🍎 ผลไม้</button>
    <button onclick="start('animal')">🐶 สัตว์</button>
    <button onclick="start('place')">🏫 สถานที่</button>
    <button onclick="start('date')">📅 วัน/เดือน</button>
    <button onclick="start('daily')">🧴 ของใช้</button>
    <button onclick="start('work')">💼 การทำงาน</button>
  </div>

  <hr>
  <button onclick="start('mix')">🔥 สุ่มทุกหมวด</button>
</div>

<!-- หน้า quiz -->
<div id="quiz" class="card" style="display:none;">
  <h2 id="word"></h2>

  <input id="ans" placeholder="พิมพ์คำศัพท์">

  <br><br>
  <button onclick="check()">ตอบ</button>

  <p id="result"></p>
  <p id="progress"></p>

  <button onclick="prev()">⬅️</button>
  <button onclick="next()">➡️</button>
  <button onclick="home()">🏠</button>
</div>

<script>

// 🔊 เสียง
function sound(ok){
 new Audio(ok?
 "https://www.soundjay.com/buttons/sounds/button-3.mp3":
 "https://www.soundjay.com/buttons/sounds/button-10.mp3"
 ).play();
}

// 📚 ข้อมูลคำศัพท์
const data={
 fruit:[
  {th:"แอปเปิ้ล",en:"apple"},
  {th:"กล้วย",en:"banana"}
 ],
 animal:[
  {th:"หมา",en:"dog"},
  {th:"แมว",en:"cat"}
 ],
 place:[
  {th:"โรงเรียน",en:"school"}
 ],
 date:[
  {th:"วันจันทร์",en:"monday"}
 ],
 daily:[
  {th:"โต๊ะ",en:"table"}
 ],
 work:[
  {th:"ประชุม",en:"meeting"}
 ]
};

let list=[],i=0,score=0,wrong=[];

// ▶️ เริ่ม
function start(cat){

 if(cat==="mix"){
   list=[].concat(...Object.values(data));
 }else{
   list=[...data[cat]];
 }

 list=list.sort(()=>Math.random()-0.5);

 i=0; score=0; wrong=[];

 menu.style.display="none";
 quiz.style.display="block";

 show();
}

// 📖 แสดงคำ
function show(){
 let q=list[i];
 word.innerText=q.th;
 ans.value="";
 result.innerText="";
 progress.innerText=`ข้อ ${i+1}/${list.length} | คะแนน ${score}`;
}

// ✅ ตรวจคำตอบ
function check(){
 let user=ans.value.toLowerCase().trim();
 let correct=list[i].en.toLowerCase();

 if(user===correct){
   result.innerText="✅ ถูก";
   score++;
   sound(true);
 }else{
   result.innerText="❌ "+correct;
   wrong.push(list[i]);
   sound(false);
 }
}

// ➡️ ถัดไป
function next(){
 if(i<list.length-1){
   i++;
   show();
 }else{
   finish();
 }
}

// ⬅️ ย้อน
function prev(){
 if(i>0){
   i--;
   show();
 }
}

// 🏠 กลับหน้าแรก
function home(){
 location.reload();
}

// 🎯 จบ
function finish(){
 if(wrong.length>0){
   alert("ทบทวนคำที่ผิด");
   list=wrong;
   wrong=[];
   i=0;
   show();
 }else{
   alert("จบแล้ว! คะแนน: "+score);
 }
}

</script>

</body>
</html>
