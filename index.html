<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab App</title>

<style>
body{
  font-family: Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.card{
  background:white;
  padding:20px;
  width:95%;
  max-width:500px;
  border-radius:25px;
  text-align:center;
}

#word{
  font-size:45px;
  font-weight:bold;
}

input{
  padding:15px;
  width:90%;
  border-radius:15px;
  font-size:20px;
}

button{
  padding:18px;
  border:none;
  border-radius:18px;
  background:#4facfe;
  color:white;
  font-size:18px;
  width:100%;
  margin-top:10px;
}

.nav-btn{
  width:30%;
}

#result{
  font-size:20px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="menu" class="card">
  <h2>📘 Vocab App</h2>
  <button onclick="start('fruit')">🍎 ผลไม้</button>
  <button onclick="start('animal')">🐶 สัตว์</button>
  <button onclick="start('mix')">🔥 สุ่ม</button>
</div>

<div id="quiz" class="card" style="display:none;">
  <div id="word"></div>

  <input id="ans" placeholder="พิมพ์คำศัพท์">

  <button onclick="check()">ตอบ</button>

  <button onclick="speak()">🔊 ฟังเสียง</button>

  <div id="result"></div>

  <button class="nav-btn" onclick="prev()">⬅️</button>
  <button class="nav-btn" onclick="next()">➡️</button>
  <button class="nav-btn" onclick="home()">🏠</button>
</div>

<script>

// 🔊 ฟังก์ชันพูด
function speak(text=null){
 let word = text || list[i].en;
 let msg = new SpeechSynthesisUtterance(word);
 msg.lang = "en-US";
 speechSynthesis.speak(msg);
}

// 📚 คำศัพท์
const data={
 fruit:[
  {th:"แอปเปิ้ล",en:"apple",read:"แอ๊ป-เพิล"},
  {th:"กล้วย",en:"banana",read:"บะ-นา-นะ"}
 ],
 animal:[
  {th:"หมา",en:"dog",read:"ด็อก"},
  {th:"แมว",en:"cat",read:"แคท"}
 ]
};

let list=[],i=0,wrong=[];

function start(cat){
 if(cat==="mix"){
   list=[].concat(...Object.values(data));
 }else{
   list=[...data[cat]];
 }

 i=0; wrong=[];
 menu.style.display="none";
 quiz.style.display="block";
 show();
}

function show(){
 word.innerText=list[i].th;
 ans.value="";
 result.innerText="";
}

// ✅ ตรวจคำตอบ
function check(){
 let user=ans.value.toLowerCase().trim();
 let correct=list[i].en.toLowerCase();
 let read=list[i].read;

 if(user===correct){
   result.innerHTML=`✅ ${correct} <br>🔊 ${read}`;
   speak(correct); // 🔊 อ่านอัตโนมัติ
 }else{
   result.innerHTML=`❌ ${correct} <br>🔊 ${read}`;
   speak(correct);
   wrong.push(list[i]);
 }
}

// ➡️
function next(){
 if(i<list.length-1){
   i++;
   show();
 }else{
   alert("จบแล้ว");
 }
}

// ⬅️
function prev(){
 if(i>0){
   i--;
   show();
 }
}

// 🏠
function home(){
 location.reload();
}

</script>

</body>
</html>
