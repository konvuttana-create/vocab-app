<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab App</title>

<style>
body{
  font-family: Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

/* กล่องเต็มจอมือถือ */
.card{
  background:white;
  padding:20px;
  width:95%;
  max-width:500px;
  border-radius:25px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  text-align:center;
}

/* คำศัพท์ใหญ่ */
#word{
  font-size:45px;
  font-weight:bold;
  margin-bottom:20px;
}

/* ช่องพิมพ์ */
input{
  padding:15px;
  width:90%;
  border-radius:15px;
  border:1px solid #ccc;
  font-size:20px;
}

/* ปุ่ม */
button{
  padding:18px;
  border:none;
  border-radius:18px;
  background:#4facfe;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
  margin-top:10px;
  transition:0.2s;
}

button:active{
  transform:scale(0.95);
}

/* เมนู grid */
.menu-grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:12px;
  margin-top:10px;
}

/* ปุ่มเล็กด้านล่าง */
.nav-btn{
  width:30%;
  display:inline-block;
}

/* ข้อความผลลัพธ์ */
#result{
  font-size:20px;
  margin-top:10px;
}

/* progress */
#progress{
  font-size:16px;
  margin-top:5px;
  color:#555;
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="card">
  <h2>📘 Vocab App BY👉KHON HUNNAL👍</h2>

  <div class="menu-grid">
    <button onclick="start('fruit')">🍎 ผลไม้</button>
    <button onclick="start('animal')">🐶 สัตว์</button>
    <button onclick="start('place')">🏫 สถานที่</button>
    <button onclick="start('date')">📅 วัน/เดือน</button>
    <button onclick="start('daily')">🧴 ของใช้</button>
    <button onclick="start('work')">💼 การทำงาน</button>
  </div>

  <button onclick="start('mix')">🔥 สุ่มทุกหมวด</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="card" style="display:none;">

  <div id="word"></div>

  <input id="ans" placeholder="พิมพ์คำศัพท์">

  <button onclick="check()">✅ ตอบ</button>

  <div id="result"></div>
  <div id="progress"></div>

  <div>
    <button class="nav-btn" onclick="prev()">⬅️</button>
    <button class="nav-btn" onclick="next()">➡️</button>
    <button class="nav-btn" onclick="home()">🏠</button>
  </div>

</div>

<script>

// 🔊 เสียง
function sound(ok){
 new Audio(ok?
 "https://www.soundjay.com/buttons/sounds/button-3.mp3":
 "https://www.soundjay.com/buttons/sounds/button-10.mp3"
 ).play();
}

// 📚 คำศัพท์
const data={
 fruit:[
  {th:"แอปเปิ้ล",en:"apple"},
  {th:"กล้วย",en:"banana"}
 ],
 animal:[
  {th:"หมา",en:"dog"},
  {th:"แมว",en:"cat"}
 ],
 place:[
  {th:"โรงเรียน",en:"school"}
 ],
 date:[
  {th:"วันจันทร์",en:"monday"}
 ],
 daily:[
  {th:"โต๊ะ",en:"table"}
 ],
 work:[
  {th:"ประชุม",en:"meeting"}
 ]
};

let list=[],i=0,score=0,wrong=[];

// ▶️ เริ่ม
function start(cat){

 if(cat==="mix"){
   list=[].concat(...Object.values(data));
 }else{
   list=[...data[cat]];
 }

 list=list.sort(()=>Math.random()-0.5);

 i=0; score=0; wrong=[];

 menu.style.display="none";
 quiz.style.display="block";

 show();
}

// 📖 แสดง
function show(){
 let q=list[i];
 word.innerText=q.th;
 ans.value="";
 result.innerText="";
 progress.innerText=`ข้อ ${i+1}/${list.length} | คะแนน ${score}`;
}

// ✅ ตรวจ
function check(){
 let user=ans.value.toLowerCase().trim();
 let correct=list[i].en.toLowerCase();

 if(user===correct){
   result.innerText="🎉 ถูกต้อง!";
   score++;
   sound(true);
 }else{
   result.innerText="❌ "+correct;
   wrong.push(list[i]);
   sound(false);
 }
}

// ➡️ ถัดไป
function next(){
 if(i<list.length-1){
   i++;
   show();
 }else{
   finish();
 }
}

// ⬅️ ย้อน
function prev(){
 if(i>0){
   i--;
   show();
 }
}

// 🏠 หน้าแรก
function home(){
 location.reload();
}

// 🎯 จบ
function finish(){
 if(wrong.length>0){
   alert("🔁 ทบทวนคำที่ผิด");
   list=wrong;
   wrong=[];
   i=0;
   show();
 }else{
   alert("🏆 คะแนน: "+score);
 }
}

</script>

</body>
</html>
