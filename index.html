<style>
body{
  font-family: Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.card{
  background:white;
  padding:20px;
  width:95%;
  max-width:500px;
  border-radius:25px;
  text-align:center;
}

#word{
  font-size:45px;
  font-weight:bold;
}

input{
  padding:15px;
  width:90%;
  border-radius:15px;
  font-size:20px;
}

button{
  padding:18px;
  border:none;
  border-radius:18px;
  background:#4facfe;
  color:white;
  font-size:18px;
  width:100%;
  margin-top:10px;
}

.nav-btn{
  width:30%;
}

#result{
  font-size:20px;
  margin-top:10px;
}

#progress{
  margin-top:5px;
  color:#555;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="card">
  <h2>📘 Vocab App</h2>

  <button onclick="start('animal')">🐶 สัตว์</button>
  <button onclick="start('daily')">🧴 ของใช้</button>

  <button onclick="start('Techer6')">📘 ครูแอน150-180</button>
  <button onclick="start('Techer7')">📘 ครูแอน180-210</button>
  <button onclick="start('mix')">🔥 สุ่มทั้งหมด</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="card" style="display:none;">
  <div id="word"></div>

  <div id="progress"></div>

  <input id="ans" placeholder="พิมพ์คำศัพท์">

  <button onclick="check()">ตอบ</button>
  <button onclick="speak()">🔊 ฟังเสียง</button>

  <div id="result"></div>

  <div>
    <button class="nav-btn" onclick="prev()">⬅️</button>
    <button class="nav-btn" onclick="next()">➡️</button>
    <button class="nav-btn" onclick="home()">🏠</button>
  </div>
</div>

function speak(text=null){
 let word = text || list[i].en;
 let msg = new SpeechSynthesisUtterance(word);
 msg.lang="en-US";
 speechSynthesis.speak(msg);
}

 return array.sort(()=>Math.random()-0.5);
}

let list=[],i=0,wrong=[],score=0;

// ▶️ เริ่ม
function start(cat){

 if(cat==="mix"){
   list=[].concat(...Object.values(data));
 }else{
   list=[...data[cat]];
 }

 list=shuffle(list); // 🔥 สุ่มทุกครั้ง

 i=0; wrong=[]; score=0;

 menu.style.display="none";
 quiz.style.display="block";

 show();
}

// 📖 แสดง
function show(){
 let q=list[i];
 word.innerText=q.th;
 ans.value="";
 result.innerText="";

 progress.innerText=`คำที่ ${i+1} / ${list.length} | คะแนน ${score}`;
}

// ✅ ตรวจ
function check(){
 let user=ans.value.toLowerCase().trim();
 let correct=list[i].en.toLowerCase();
 let read=list[i].read;

 if(user===correct){
   result.innerHTML=`✅ ${correct}<br>🔊 ${read}`;
   score++;
   speak(correct);
 }else{
   result.innerHTML=`❌ ${correct}<br>🔊 ${read}`;
   wrong.push(list[i]);
   speak(correct);
 }
}

// ➡️
function next(){
 if(i<list.length-1){
   i++;
   show();
 }else{
   finish();
 }
}

// ⬅️
function prev(){
 if(i>0){
   i--;
   show();
 }
}

// 🏠
function home(){
 location.reload();
}

// 🎯 จบ
function finish(){
 if(wrong.length>0){
   alert("🔁 ทบทวนคำที่ผิด");
   list=shuffle(wrong);
   wrong=[];
   i=0;
   show();
 }else{
   alert("🏆 คะแนน: "+score);
 }
}
