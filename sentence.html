<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Practice Categories</title>

<style>
body{
  font-family: Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#36d1dc,#5b86e5);
}

.card{
  background:white;
  padding:20px;
  width:95%;
  max-width:550px;
  border-radius:20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

#word{
  font-size:28px;
  font-weight:bold;
}

.box{
  background:#f1f1f1;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.audio-group{
  display:flex;
  gap:0;
}

.audio-group button{
  margin:0;
  border-radius:0;
}

.audio-group button:first-child{
  border-radius:10px 0 0 10px;
}

.audio-group button:last-child{
  border-radius:0 10px 10px 0;
}

input{
  width:95%;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#36d1dc;
  color:white;
  margin-top:5px;
}

.nav{
  display:flex;
  gap:5px;
}
.nav button{ width:33%; }
</style>
</head>

<body>

<!-- หน้าเลือกหมวด -->
<div id="menu" class="card">
  <h2>📂 เลือกหมวด</h2>
  <div class="grid">
    <button onclick="start('daily')">ชีวิตประจำวัน</button>
    <button onclick="start('travel')">ท่องเที่ยว</button>
    <button onclick="start('work')">การทำงาน</button>
    <button onclick="start('all')">สุ่มทุกหมวด</button>
  </div>
</div>

<!-- หน้าแบบฝึก -->
<div id="quiz" class="card" style="display:none;">
  <div id="word"></div>

  <div id="sentences"></div>

  <button onclick="toggleAnswer()">👁 แสดง/ซ่อนเฉลย</button>

  <div id="inputs"></div>

  <button onclick="check()">✅ ตรวจ</button>
  <button onclick="hint()">💡 ใบ้</button>

  <div id="result"></div>

  <div class="nav">
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>
    <button onclick="home()">🏠</button>
  </div>
</div>

<script>

// 📚 ข้อมูลแยกหมวด
const categories = {

daily: [
{
 word:"food",
 sentences:[
  "I eat food.",
  "I eat food at home.",
  "I eat food at home with my family."
 ]
}
],

travel: [
{
 word:"hotel",
 sentences:[
  "I stay at a hotel.",
  "I stay at a hotel near the beach.",
  "I stay at a hotel near the beach with my friends."
 ]
}
],

work: [
{
 word:"meeting",
 sentences:[
  "I have a meeting.",
  "I have a meeting at work.",
  "I have a meeting at work with my manager."
 ]
}
]

};

let list=[], i=0;
let showAns=false;
let userAnswers=[];

// 🔀 สุ่ม
function shuffle(arr){
 return arr.sort(()=>Math.random()-0.5);
}

// ▶️ เริ่ม (เลือกหมวด)
function start(type){

 if(type==="all"){
   list = Object.values(categories).flat();
 }else{
   list = categories[type];
 }

 list = shuffle([...list]);

 i=0;
 menu.style.display="none";
 quiz.style.display="block";
 userAnswers = list.map(()=>["","",""]);
 render();
}

// 📖 แสดง
function render(){
 let data = list[i];
 word.innerText = data.word;

 sentences.innerHTML="";

 data.sentences.forEach((s,idx)=>{
   let div = document.createElement("div");
   div.className="box";

   let text = document.createElement("span");
   text.innerText = showAns ? (idx+1)+". "+s : (idx+1)+". ________";

   let audioGroup = document.createElement("div");
   audioGroup.className="audio-group";

   let btn1 = document.createElement("button");
   btn1.innerText="🔊";
   btn1.onclick = ()=> speak(s,false);

   let btn2 = document.createElement("button");
   btn2.innerText="🐢";
   btn2.onclick = ()=> speak(s,true);

   audioGroup.appendChild(btn1);
   audioGroup.appendChild(btn2);

   div.appendChild(text);
   div.appendChild(audioGroup);

   sentences.appendChild(div);
 });

 inputs.innerHTML="";
 data.sentences.forEach((_,idx)=>{
   let inp = document.createElement("input");
   inp.value = userAnswers[i][idx];

   inp.oninput = (e)=>{
     userAnswers[i][idx] = e.target.value;
   };

   inputs.appendChild(inp);
 });

 result.innerText="";
}

// 👁 toggle
function toggleAnswer(){
 showAns = !showAns;
 render();
}

// 🔊 เสียง
function speak(text, slow=false){
 let msg = new SpeechSynthesisUtterance(text);
 msg.lang="en-US";
 msg.rate = slow ? 0.6 : 1;
 speechSynthesis.speak(msg);
}

// 💡 ใบ้
function hint(){
 let data = list[i];
 let inputs = document.querySelectorAll("#inputs input");

 inputs.forEach((inp,idx)=>{
   let correct = data.sentences[idx];
   let current = inp.value;

   if(current.length < correct.length){
     inp.value += correct[current.length];
     userAnswers[i][idx] = inp.value;
   }
 });
}

// ✅ ตรวจ
function check(){
 let data = list[i];
 let correct=0;

 userAnswers[i].forEach((ans,idx)=>{
   if(ans.toLowerCase().trim() === data.sentences[idx].toLowerCase()){
     correct++;
   }
 });

 result.innerText = `ได้ ${correct}/3`;
}

// ➡️
function next(){
 if(i<list.length-1){
   i++;
   render();
 }
}

// ⬅️
function prev(){
 if(i>0){
   i--;
   render();
 }
}

// 🏠
function home(){
 location.reload();
}

</script>

</body>
</html>
