<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Practice FINAL</title>

<style>
body{
  font-family: Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#36d1dc,#5b86e5);
}

.card{
  background:white;
  padding:20px;
  width:95%;
  max-width:550px;
  border-radius:25px;
  text-align:center;
  max-height:90vh;
  overflow-y:auto;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(110px,1fr));
  gap:12px;
}

.cat{
  aspect-ratio:1/1;
  border-radius:20px;
  border:none;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  box-shadow:0 5px 10px rgba(0,0,0,0.15);
}
.cat span{font-size:28px;}

.c1{background:linear-gradient(135deg,#ff9a9e,#fad0c4);}
.c2{background:linear-gradient(135deg,#a18cd1,#fbc2eb);}
.c3{background:linear-gradient(135deg,#f6d365,#fda085);}
.c4{background:linear-gradient(135deg,#84fab0,#8fd3f4);}

#word{font-size:28px;font-weight:bold;}
#progress{margin-bottom:10px;color:#555;}

.box{
  background:#f8faff;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  border-left:5px solid #4facfe;
  display:flex;
  justify-content:space-between;
}

.text{text-align:left;}
.answer{font-size:14px;color:#555;}

/* ⭐ จัดกลางจริง */
.answer-section{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:10px;
}

#inputs{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.input-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin:8px 0;
  width:100%;
  max-width:420px;
}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:2px solid #4facfe;
  background:#eef6ff;
}

input.wrong-input{
  border-color:red;
  background:#ffecec;
}

.input-row span{
  width:30px;
  text-align:center;
}

.correct{color:green;}
.wrong{color:red;}

.wrong-text{color:red;font-weight:bold;}
.correct-text{color:green;font-weight:bold;}

.center{
  display:flex;
  justify-content:center;
}

.btn-group{
  display:flex;
  gap:10px;
  width:100%;
  max-width:420px;
}

.btn-group button{
  flex:1;
}

.audio-group{
  display:flex;
}
.audio-group button{
  border:none;
  padding:6px 10px;
  color:white;
}
.audio-group button:first-child{
  background:#4facfe;
}
.audio-group button:last-child{
  background:#f6d365;
}

button{
  padding:12px;
  border:none;
  border-radius:14px;
  color:white;
  margin-top:8px;
}

.btn-check{background:#4facfe;}
.btn-hint{background:#f6d365;}
.btn-toggle{background:#84fab0;}

.nav{
  display:flex;
  gap:5px;
}
.nav button{width:33%;}
.nav button:nth-child(1){background:#fa709a;}
.nav button:nth-child(2){background:#30cfd0;}
.nav button:nth-child(3){background:#a18cd1;}

</style>
</head>

<body>

<div id="menu" class="card">
  <h2>🔥 เลือกหมวดฝึกประโยค  🔥</h2>
  <div class="grid">
    <button class="cat c1" onclick="start('daily')"><span>🏠</span>ชีวิต</button>
    <button class="cat c2" onclick="start('travel')"><span>✈️</span>เที่ยว</button>
    <button class="cat c3" onclick="start('work')"><span>💼</span>งาน</button>
    <button class="cat c4" onclick="start('all')"><span>🎲</span>สุ่ม</button>
  </div>
</div>

<div id="quiz" class="card" style="display:none;">
  <div id="word"></div>
  <div id="progress"></div>

  <div id="sentences"></div>

  <div class="center">
    <button class="btn-toggle" onclick="toggleAnswer()">👁 เฉลย</button>
  </div>

  <div class="answer-section">
    <div id="inputs"></div>

    <div class="btn-group">
      <button class="btn-check" onclick="check()">ตรวจ</button>
      <button class="btn-hint" onclick="hint()">ใบ้</button>
    </div>
  </div>

  <div id="result"></div>

  <div class="nav">
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>
    <button onclick="home()">🏠</button>
  </div>
</div>

<script>

const categories = {
daily:[{word:"food",sentences:[
{en:"I eat food.",th:"ฉันกินอาหาร",read:"ไอ อีท ฟู้ด"},
{en:"I eat food at home.",th:"ฉันกินอาหารที่บ้าน",read:"ไอ อีท ฟู้ด แอท โฮม"},
{en:"I eat food with my family.",th:"ฉันกินอาหารกับครอบครัว",read:"ไอ อีท ฟู้ด วิธ มาย แฟมิลี่"}
]
},
{
 word:"water",
 sentences:[
  {en:"I drink water.", th:"ฉันดื่มน้ำ", read:"ไอ ดริ้ง วอเทอร์"},
 
{en:"I drink water every day.", th:"ฉันดื่มน้ำทุกวัน", read:"ไอ ดริ้ง วอเทอร์ เอฟเวอรี่ เดย์"},
 
{en:"I drink water after exercise.", th:"ฉันดื่มน้ำหลังออกกำลังกาย", read:"ไอ ดริ้ง วอเทอร์ อาฟเตอร์ เอ็กเซอไซส์"}
 
]

},


{
 word:"coffee",
 sentences:[
  {en:"I drink coffee.", th:"ฉันดื่มกาแฟ", read:"ไอ ดริ้ง คอฟฟี่"},
 
{en:"I drink coffee in the morning.", th:"ฉันดื่มกาแฟตอนเช้า", read:"ไอ ดริ้ง คอฟฟี่ อิน เดอะ มอร์นิ่ง"},
 
{en:"I drink coffee at work.", th:"ฉันดื่มกาแฟที่ทำงาน", read:"ไอ ดริ้ง คอฟฟี่ แอท เวิร์ค"}
 
]

},


{
 word:"rice",
 sentences:[
  {en:"I eat rice.", th:"ฉันกินข้าว", read:"ไอ อีท ไรซ์"},

{en:"I eat rice every day.", th:"ฉันกินข้าวทุกวัน", read:"ไอ อีท ไรซ์ เอฟเวอรี่ เดย์"},
 
{en:"I eat rice with chicken.", th:"ฉันกินข้าวกับไก่", read:"ไอ อีท ไรซ์ วิธ ชิคเค่น"}
 
]

},


{
 word:"fruit",
 sentences:[
  {en:"I eat fruit.", th:"ฉันกินผลไม้", read:"ไอ อีท ฟรุ๊ต"},
 
{en:"I eat fruit every day.", th:"ฉันกินผลไม้ทุกวัน", read:"ไอ อีท ฟรุ๊ต เอฟเวอรี่ เดย์"},
 
{en:"I eat fruit after dinner.", th:"ฉันกินผลไม้หลังอาหารเย็น", read:"ไอ อีท ฟรุ๊ต อาฟเตอร์ ดินเนอร์"}
 
]

}
],

travel:[{word:"hotel",sentences:[
{en:"I stay at a hotel.",th:"ฉันพักโรงแรม",read:"ไอ สเตย์ แอท อะ โฮเทล"},
{en:"I stay at a hotel near the beach.",th:"ฉันพักใกล้ทะเล",read:"ไอ สเตย์ แอท อะ โฮเทล เนียร์ เดอะ บีช"},
{en:"I stay with my friends.",th:"ฉันพักกับเพื่อน",read:"ไอ สเตย์ วิธ มาย เฟรนด์"}]}],
work:[{word:"meeting",sentences:[
{en:"I have a meeting.",th:"ฉันมีประชุม",read:"ไอ แฮฟ อะ มีทติ้ง"},
{en:"I have a meeting at work.",th:"ฉันประชุมที่ทำงาน",read:"ไอ แฮฟ อะ มีทติ้ง แอท เวิร์ค"},
{en:"I have a meeting with my boss.",th:"ฉันประชุมกับหัวหน้า",read:"ไอ แฮฟ อะ มีทติ้ง วิธ มาย บอส"}]}]
};

let list=[],i=0,showAns=false,userAnswers=[],results=[];

function start(type){
 list=type==="all"?Object.values(categories).flat():categories[type];
 i=0;
 menu.style.display="none";
 quiz.style.display="block";
 userAnswers=list.map(d=>d.sentences.map(()=>"" ));
 results=list.map(d=>d.sentences.map(()=>null));
 render();
}

function speak(t,s=false){
 let m=new SpeechSynthesisUtterance(t);
 m.lang="en-US"; m.rate=s?0.6:1;
 speechSynthesis.speak(m);
}

function highlightDiff(u,c){
 let ua=u.trim().split(" "),ca=c.trim().split(" "),r="";
 for(let i=0;i<ca.length;i++){
  r+=ua[i]===ca[i]?`<span class="correct-text">${ca[i]}</span> `:`<span class="wrong-text">${ca[i]}</span> `;
 }
 return r;
}

function render(){
 let d=list[i];
 word.innerText=d.word;
 progress.innerText=`ข้อ ${i+1}/${list.length}`;
 sentences.innerHTML="";

 d.sentences.forEach((s,idx)=>{
  let div=document.createElement("div"); div.className="box";
  let text=document.createElement("div");

  if(showAns){
    let diff=results[i][idx]===false?`<div>${highlightDiff(userAnswers[i][idx]||"",s.en)}</div>`:"";
    text.innerHTML=`<b>${idx+1}. ${s.en}</b>
    <div class="answer">${s.read}</div>
    <div class="answer">${s.th}</div>${diff}`;
  }else{
    text.innerText=`${idx+1}. ________`;
  }

  let audio=document.createElement("div"); audio.className="audio-group";
  let b1=document.createElement("button"); b1.innerText="🔊"; b1.onclick=()=>speak(s.en);
  let b2=document.createElement("button"); b2.innerText="🐢"; b2.onclick=()=>speak(s.en,true);
  audio.appendChild(b1); audio.appendChild(b2);

  div.appendChild(text); div.appendChild(audio);
  sentences.appendChild(div);
 });

 inputs.innerHTML="";
 d.sentences.forEach((s,idx)=>{
  let row=document.createElement("div"); row.className="input-row";
  let inp=document.createElement("input");
  inp.value=userAnswers[i][idx];
  inp.oninput=e=>userAnswers[i][idx]=e.target.value;

  let mark=document.createElement("span");
  if(results[i][idx]===true){mark.innerHTML="✔";mark.className="correct";}
  else if(results[i][idx]===false){mark.innerHTML="❌";mark.className="wrong";inp.classList.add("wrong-input");}

  row.appendChild(inp); row.appendChild(mark);
  inputs.appendChild(row);
 });
}

function toggleAnswer(){showAns=!showAns;render();}

function hint(){
 let d=list[i];
 document.querySelectorAll("#inputs input").forEach((inp,idx)=>{
  let c=d.sentences[idx].en;
  if(inp.value.length<c.length){
    inp.value+=c[inp.value.length];
    userAnswers[i][idx]=inp.value;
  }
 });
}

function check(){
 let d=list[i],c=0;
 userAnswers[i].forEach((ans,idx)=>{
  if(ans.toLowerCase().trim()===d.sentences[idx].en.toLowerCase()){
    results[i][idx]=true; c++;
  }else results[i][idx]=false;
 });
 result.innerText=`ได้ ${c}/${d.sentences.length}`;
 showAns=true; // ⭐ แสดงเฉลยทันที
 render();
}

function next(){if(i<list.length-1){i++;showAns=false;render();}}
function prev(){if(i>0){i--;render();}}
function home(){location.reload();}

</script>

</body>
</html>
