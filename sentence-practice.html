<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Final App</title>

<style>
body{
  font-family: Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.card{
  background:white;
  padding:20px;
  width:95%;
  max-width:500px;
  border-radius:25px;
  text-align:center;
  max-height:90vh;
  overflow-y:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
  gap:15px;
}

/* ICON */
.cat{
  aspect-ratio:1/1;
  border-radius:20px;
  border:none;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  box-shadow:0 5px 10px rgba(0,0,0,0.15);
  transition: all 0.15s ease;
}
.cat span{ font-size:28px; }

.cat:hover{ transform:translateY(-3px); }
.cat:active{ transform:scale(0.9); }

/* 🎨 สี */
.c1{background:linear-gradient(135deg,#ff9a9e,#fad0c4);}
.c2{background:linear-gradient(135deg,#a18cd1,#fbc2eb);}
.c3{background:linear-gradient(135deg,#f6d365,#fda085);}
.c4{background:linear-gradient(135deg,#84fab0,#8fd3f4);}
.c5{background:linear-gradient(135deg,#fccb90,#d57eeb);}
.c6{background:linear-gradient(135deg,#43e97b,#38f9d7);}
.c7{background:linear-gradient(135deg,#fa709a,#fee140);}
.c8{background:linear-gradient(135deg,#30cfd0,#330867);}

/* QUIZ ANIMATION */
.fade{
  animation:fade 0.3s ease;
}
@keyframes fade{
  from{opacity:0; transform:scale(0.95);}
  to{opacity:1; transform:scale(1);}
}

/* WORD */
#word{
  font-size:22px;
  font-weight:bold;
  margin-bottom:8px;
  word-break:break-word;

}

/* 🔥 INPUT (แก้ตรงนี้) */
#ans input{
  width:20px;
  height:28px;
  margin:2px;
  text-align:center;
  font-size:18px;
  border-radius:8px;
  border:2px solid #4facfe;
  background:#eaf4ff;
  outline:none;
  transition:0.2s;
}

/* focus */
#ans input:focus{
  border-color:#ff9a9e;
  background:#fff;
  transform:scale(1.1);
}

/* 🎨 ปุ่ม */
.btn-check{background:#4facfe;}
.btn-hint{background:#f6d365;}
.btn-speak{background:#84fab0;}

button{
  padding:12px;
  border:none;
  border-radius:15px;
  color:white;
  font-size:18px;
  width:80%;
  margin-top:10px;
}

/* nav */
.nav{ display:flex; gap:5px; }
.nav button:nth-child(1){background:#fa709a;}
.nav button:nth-child(2){background:#30cfd0;}
.nav button:nth-child(3){background:#a18cd1;}
.nav button{ width:33%; }

/* result */
#result{
  margin-top:10px;
  font-size:16px;
}

</style>

</head>

<body>

<!-- MENU -->

<div id="menu" class="card">
  <h2>📚 เลือกหมวด</h2>
  <div class="grid" id="categoryGrid"></div>
</div>

<!-- QUIZ -->

<div id="quiz" class="card" style="display:none;">
  <div id="word"></div>
  <div id="progress"></div>
  <div id="ans"></div>

<button class="btn-check" onclick="check()">ตอบ</button> <button class="btn-hint" onclick="hint()">💡 ใบ้</button> <button class="btn-speak" onclick="speak()">🔊 ออกเสียง</button>

  <div id="result"></div>

  <div class="nav">
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>
    <button onclick="home()">🏠</button>
  </div>
</div>

<script>

// vocab
const vocab = {
 
   Test1: [
{th:"เขาเกิดอุบัติเหตุระหว่างทางไปทำงาน", en:"he had an accident on the way to work", read:"ฮี แฮด แอน แอ็กซิเดนท์ ออน เดอะ เวย์ ทู เวิร์ก"},

{th:"ฉันต้องการที่อยู่ของคุณเพื่อส่งจดหมาย", en:"i need your address to send you a letter", read:"ไอ นีด ยัวร์ แอดเดรส ทู เซนด์ ยู อะ เลตเทอร์"},

{th:"ผู้ใหญ่ตามกฎหมายคือผู้ที่มีอายุเกิน 18 ปี", en:"a legal adult is anyone over the age of 18", read:"อะ ลีเกิล อะดัลต์ อิส เอนีวัน โอเวอร์ ดิ เอจ ออฟ เอทีน"},

{th:"เธอให้คำแนะนำเกี่ยวกับอาชีพของฉัน", en:"she gave me advice for my career", read:"ชี เกฟ มี แอดไวซ์ ฟอร์ มาย คะเรียร์"},

{th:"สวนสัตว์เป็นบ้านของสัตว์หลากหลายชนิด", en:"the zoo is home to a variety of animals", read:"เดอะ ซู อิส โฮม ทู อะ วะไรเออะที ออฟ แอนนิมอลส์"},

{th:"ฉันจะให้กุญแจอพาร์ตเมนต์ของฉันแก่คุณ", en:"i will give you the keys to my apartment", read:"ไอ วิล กิฟ ยู เดอะ คีย์ส ทู มาย อะพาร์ตเมนต์"},

{th:"คุณอยากได้แอปเปิ้ลเป็นของว่างไหม", en:"would you like an apple for a snack", read:"วูด ยู ไลค์ แอน แอปเปิล ฟอร์ อะ สแน็ก"},

{th:"ฉันส่งใบสมัครงานเมื่อวานนี้", en:"i submitted my job application yesterday", read:"ไอ ซับมิททิด มาย จ็อบ แอปพลิเคชัน เยสเทอะเดย์"},

{th:"ฉันมีนัดกับหมอเวลา 3 โมงเย็น", en:"i have a doctor's appointment at 3 pm", read:"ไอ แฮฟ อะ ด็อกเตอร์ส อะพอยท์เมนท์ แอท ทรี พีเอ็ม"},

{th:"ใบไม้เปลี่ยนสีในฤดูใบไม้ร่วง", en:"the leaves change color in autumn", read:"เดอะ ลีฟส์ เชนจ์ คัลเลอร์ อิน ออทัม"},

{th:"เด็กทารกกำลังนอนหลับ", en:"the baby is sleeping", read:"เดอะ เบบี้ อิส สลีพพิง"},

{th:"ฉันต้องซื้อกระเป๋านักเรียนใหม่", en:"i need to buy a new school bag", read:"ไอ นีด ทู บาย อะ นิว สคูล แบ็ก"},

{th:"เด็กๆ เล่นลูกโป่งในงานปาร์ตี้", en:"the children played with balloons at the party", read:"เดอะ ชิลเดรน เพลย์ด วิธ บะลูนส์ แอท เดอะ ปาร์ตี้"},

{th:"ฉันต้องไปธนาคารเพื่อถอนเงิน", en:"i need to go to the bank to withdraw some money", read:"ไอ นีด ทู โก ทู เดอะ แบงก์ ทู วิธดรอ ซัม มันนี"},

{th:"พวกเราชอบไปทะเลในช่วงวันหยุด", en:"we like to go to the beach on our holidays", read:"วี ไลค์ ทู โก ทู เดอะ บีช ออน อาวร์ ฮอลิเดย์ส"}
]

};

const icons = {Test1:"📚",random:"🎲"};
const colors=["c1","c2","c3","c4","c5","c6","c7","c8"];

function renderCategories(){
  let grid=document.getElementById("categoryGrid");
  let i=0;

  for(let key in vocab){
    let btn=document.createElement("button");
    btn.className="cat "+colors[i%colors.length];
    btn.innerHTML=`<span>${icons[key]}</span>${key}`;
    btn.onclick=()=>selectCategory(key);
    grid.appendChild(btn);
    i++;
  }

  let rand=document.createElement("button");
  rand.className="cat "+colors[i%colors.length];
  rand.innerHTML=`<span>🎲</span>สุ่ม`;
  rand.onclick=startRandomAll;
  grid.appendChild(rand);
}
renderCategories();

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function startRandomAll(){
  let all=[];
  for(let k in vocab){ all=all.concat(vocab[k]); }
  while(all.length<50){ all=all.concat(all); }
  list=shuffle(all).slice(0,50);
  startGame();
}

function selectCategory(cat){
  list=shuffle([...vocab[cat]]);
  startGame();
}

function startGame(){
  i=0; score=0; wrong=[];
  menu.style.display="none";
  quiz.style.display="block";
  show();
}

let list=[], i=0, score=0, wrong=[], revealed=[];

// 🔊
function speak(text=null){
  let word=text||list[i].en;
  let msg=new SpeechSynthesisUtterance(word);
  msg.lang="en-US";
  speechSynthesis.speak(msg);
}

// show
function show(){
  quiz.classList.remove("fade");
  void quiz.offsetWidth;
  quiz.classList.add("fade");

  let q=list[i];
  word.innerText=q.th;
  revealed=Array(q.en.length).fill(false);

  ans.innerHTML="";

  for(let j=0;j<q.en.length;j++){
    let inp=document.createElement("input");
    inp.maxLength=1;

    // 🔥 auto next
    inp.addEventListener("input", function(){
      this.value=this.value.toLowerCase();
      if(this.value.length===1){
        let next=this.nextElementSibling;
        if(next) next.focus();
      }
    });

    // 🔥 backspace ย้อน
    inp.addEventListener("keydown", function(e){
      if(e.key==="Backspace" && this.value===""){
        let prev=this.previousElementSibling;
        if(prev) prev.focus();
      }
    });

    ans.appendChild(inp);
  }

  // focus ช่องแรก
  setTimeout(()=>{
    let first=document.querySelector("#ans input");
    if(first) first.focus();
  },100);

  progress.innerText=`${i+1}/${list.length} | คะแนน ${score}`;
  result.innerText="";
}

// answer
function getAnswer(){
  return [...document.querySelectorAll("#ans input")]
  .map(i=>i.value).join("").toLowerCase();
}

// check
function check(){
  let user=getAnswer();
  let correct=list[i].en;
  let read=list[i].read;

  if(user===correct){
    result.innerHTML=`✅ ${correct}<br>🔊 ${read}`;
    score++;
  }else{
    result.innerHTML=`❌ ${correct}<br>🔊 ${read}`;
    wrong.push(list[i]);
  }

  speak(correct);
}

// hint
function hint(){
  let w=list[i].en;
  let inputs=document.querySelectorAll("#ans input");
  let r=Math.floor(Math.random()*w.length);
  inputs[r].value=w[r];
}

// nav
function next(){ i<list.length-1?(i++,show()):finish(); }
function prev(){ if(i>0){i--;show();} }
function home(){ location.reload(); }

// finish
function finish(){
  alert("🏆 คะแนน: "+score);
}

</script>

</body>
</html>
